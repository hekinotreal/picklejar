<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Infinity Beyond: The Powiaina Quest</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #111111;
            --accent: #00ffcc;
            --text: #e0e0e0;
            --border: #333;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #sidebar {
            width: 250px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .nav-btn {
            padding: 15px;
            border: none;
            background: none;
            color: #888;
            text-align: left;
            cursor: pointer;
            border-bottom: 1px solid #222;
            transition: 0.2s;
        }
        .nav-btn:hover { background: #1a1a1a; color: var(--accent); }
        .nav-btn.active { color: var(--accent); background: #1a1a1a; border-left: 4px solid var(--accent); }
        
        #main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        #resource-header {
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .main-val { font-size: 3rem; font-weight: bold; color: var(--accent); }
        
        .upgrade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 4px;
            cursor: pointer;
        }
        .card:hover:not(.disabled) { border-color: var(--accent); }
        .card.disabled { opacity: 0.5; cursor: not-allowed; }
        .card h4 { margin: 0 0 10px 0; }
        .cost { font-size: 0.8rem; color: #aaa; }

        .layer-btn {
            background: var(--accent);
            color: black;
            padding: 15px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
        .periodic-table { display: grid; grid-template-columns: repeat(18, 1fr); gap: 2px; }
        .element { width: 40px; height: 40px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; cursor: pointer; border: 1px solid #333; }
        .element.unlocked { background: var(--accent); color: black; }
        
        #copy-helper { position: fixed; bottom: 10px; right: 10px; background: #333; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="padding: 20px; font-weight: bold; color: var(--accent); border-bottom: 1px solid var(--border)">Infinity Beyond</div>
    <button class="nav-btn active" onclick="showTab('points')">Points (L1)</button>
    <button class="nav-btn" onclick="showTab('energy')">Energy (L2)</button>
    <button class="nav-btn" onclick="showTab('periodic')">Periodic Table (L5)</button>
    <button class="nav-btn" onclick="showTab('skills')">Skill Tree (L8)</button>
    <button class="nav-btn" onclick="showTab('space')">Stellar/Space (L12)</button>
    <button class="nav-btn" onclick="showTab('multiverse')">Multiverse (L15)</button>
    <button class="nav-btn" onclick="showTab('settings')">Settings</button>
</div>

<div id="main">
    <div id="resource-header">
        <div id="layer-name">Points</div>
        <div class="main-val" id="points-display">1.00</div>
        <div id="per-sec">Generating 1.00 / sec</div>
    </div>

    <div id="tab-points" class="tab-content">
        <h3>Primary Generators</h3>
        <div class="upgrade-grid" id="gen-grid">
            <!-- Dynamic -->
        </div>
        <button class="layer-btn" id="prestige-btn" onclick="prestige(2)">RESET FOR ENERGY (+0)</button>
    </div>

    <div id="tab-periodic" class="tab-content" style="display:none">
        <h3>Periodic Table of Elements</h3>
        <p>Unlock elements to gain permanent massive boosts.</p>
        <div class="periodic-table" id="periodic-table">
            <!-- 118 Elements -->
        </div>
    </div>

    <div id="tab-settings" class="tab-content" style="display:none">
        <h3>Game Settings</h3>
        <button onclick="save()">Manual Save</button>
        <button onclick="hardReset()" style="background:red; color:white">HARD RESET</button>
        <p>Time played: <span id="time-played">0:00:00</span></p>
        <p>Target: 1500 Hours</p>
    </div>
</div>

<!-- LIBRARIES -->

// FORMATTER (VeryrrDefine)
const format = (function() {
    return function(num, precision = 2) {
        if (num.isZero()) return "0.00";
        if (!num.isFinite()) return "Infinity";
        let val = num.toNumber();
        if (val < 1000) return val.toFixed(precision);
        if (val < 1e6) return val.toLocaleString();
        let e = Math.floor(Math.log10(val));
        let m = val / Math.pow(10, e);
        return m.toFixed(precision) + "e" + e;
    };
})();

<script>
// GAME LOGIC
const PN = PowiainaNum.default;

let game = {
    points: new PN(10),
    bestPoints: new PN(0),
    totalPoints: new PN(0),
    energy: new PN(0),
    elements: [],
    gens: [0,0,0,0,0,0,0,0],
    genCosts: [10, 100, 1000, 1e4, 1e6, 1e9, 1e12, 1e15],
    startTime: Date.now(),
    lastSave: Date.now(),
    tab: 'points'
};

function init() {
    load();
    renderGens();
    renderPeriodicTable();
    loop();
}

function loop() {
    let now = Date.now();
    let dt = (now - game.lastSave) / 1000;
    game.lastSave = now;

    // Production
    let gain = calculateGain();
    game.points = game.points.add(gain.mul(dt));
    game.totalPoints = game.totalPoints.add(gain.mul(dt));
    if (game.points.gt(game.bestPoints)) game.bestPoints = game.points;

    updateUI();
    requestAnimationFrame(loop);
}

function calculateGain() {
    let g = new PN(0);
    for(let i=0; i<8; i++) {
        let p = new PN(game.gens[i]).mul(Math.pow(2, i));
        g = g.add(p);
    }
    // Element boosts
    g = g.mul(new PN(1).add(new PN(game.elements.length).mul(0.1)));
    return g;
}

function renderGens() {
    const grid = document.getElementById('gen-grid');
    grid.innerHTML = '';
    for(let i=0; i<8; i++) {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = 'gen-' + i;
        card.onclick = () => buyGen(i);
        card.innerHTML = `
            <h4>Tier ${i+1} Gen</h4>
            <div id="gen-count-${i}">Amount: ${game.gens[i]}</div>
            <div class="cost" id="gen-cost-${i}">Cost: ${format(new PN(game.genCosts[i] * Math.pow(1.5, game.gens[i])))}</div>
        `;
        grid.appendChild(card);
    }
}

function buyGen(i) {
    let cost = new PN(game.genCosts[i] * Math.pow(1.5, game.gens[i]));
    if (game.points.gte(cost)) {
        game.points = game.points.sub(cost);
        game.gens[i]++;
        renderGens();
    }
}

function renderPeriodicTable() {
    const table = document.getElementById('periodic-table');
    table.innerHTML = '';
    for(let i=1; i<=118; i++) {
        const el = document.createElement('div');
        el.className = 'element' + (game.elements.includes(i) ? ' unlocked' : '');
        el.innerText = i;
        el.onclick = () => unlockElement(i);
        table.appendChild(el);
    }
}

function unlockElement(i) {
    let cost = new PN("1e" + (i * 5));
    if (game.points.gte(cost) && !game.elements.includes(i)) {
        game.points = game.points.sub(cost);
        game.elements.push(i);
        renderPeriodicTable();
    }
}

function updateUI() {
    document.getElementById('points-display').innerText = format(game.points);
    document.getElementById('per-sec').innerText = "Generating " + format(calculateGain()) + " / sec";
    
    let prestigeGain = game.points.log10().div(308).floor();
    document.getElementById('prestige-btn').innerText = "RESET FOR ENERGY (+" + format(prestigeGain, 0) + ")";
    
    let time = (Date.now() - game.startTime) / 1000;
    let h = Math.floor(time / 3600);
    let m = Math.floor((time % 3600) / 60);
    let s = Math.floor(time % 60);
    document.getElementById('time-played').innerText = h + ":" + m.toString().padStart(2,'0') + ":" + s.toString().padStart(2,'0');
}

function showTab(t) {
    document.querySelectorAll('.tab-content').forEach(x => x.style.display = 'none');
    document.getElementById('tab-' + t).style.display = 'block';
    document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('layer-name').innerText = t.charAt(0).toUpperCase() + t.slice(1);
}

function save() {
    localStorage.setItem('powiaina_save', JSON.stringify(game));
}

function load() {
    let s = localStorage.getItem('powiaina_save');
    if (s) {
        let d = JSON.parse(s);
        Object.assign(game, d);
        game.points = new PN(d.points);
        // ... Re-hydrate other PNs
    }
}

function hardReset() {
    if(confirm("REALLY? This will wipe 1500 hours of potential progress!")) {
        localStorage.clear();
        location.reload();
    }
}

init();
</script>

<div id="copy-helper" onclick="navigator.clipboard.writeText(document.documentElement.outerHTML)">Copy All Code</div>

</body>
</html>
